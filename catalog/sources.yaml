# --- Catalog production (year-based) ---
- name: Inventory for 2024 catalog.xlsx
  type: reference
  drive_file_id: 1l3rWoPT534jnuVsnSmJ_qhli8x47-K3G
  local_path: data/raw/Inventory_for_2024_catalog.xlsx
  enabled: false
  notes: |
    27 KB.  Despite the filename, this is a curatorial brainstorm for
    the 2024 catalog, NOT an inventory source.  Single sheet with
    "Portraits" header and ~170 candidate titles bucketed under the
    year of the previous catalog they appeared in (2019-2022).  No
    KG-#, no artist, no medium, no dimensions.  Ingesting these as
    observations would just emit ~170 untethered title strings with
    no field linkages.  Reclassified as `reference` and left disabled.
    Real catalog-source ingestion will come from year-based catalog
    PDFs (Phase E in the original plan).

