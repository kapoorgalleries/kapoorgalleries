# Source registry for the Kapoor Galleries inventory pipeline.
#
# `local_path` must point at a file under data/raw/ (gitignored). Any source
# whose `local_path` is missing is reported in `make ingest` output and
# silently skipped — drop the file in and re-run.
#
# To add a new source:
#   1. Pick `type` from src/cli.py:INGESTERS
#   2. Note the Drive ID (so we can re-fetch if needed)
#   3. Drop the file at data/raw/<name>
#   4. `make ingest`
#
# IDs were discovered during Phase A; the registry is append-only.

- name: Artsy_2-16-2026.csv
  type: artsy_csv
  drive_file_id: 1IEIQhviVzfwXeaZoDzdAps5srjQOzmva
  drive_file_path: My Drive / Kapoor Internal / Artsy / Artsy_2-16-2026.csv
  local_path: data/raw/Artsy_2-16-2026.csv
  notes: |
    Primer→Artsy snapshot, Feb 16 2026. Authoritative for KG-1000..KG-1698.
    FileMaker `I_Iinfo::D__Height` namespace; multi-image rows belong to the
