# Collection landing pages for the public website.
#
# Each collection becomes a /collections/<slug> page surfacing a curated
# subset of the inventory.  Membership can come from either:
#
#   - ``include_tags``   — any work carrying one of the listed tag values
#                          is a member.  Tags come from
#                          ``website_inventory.json#works[].tags``.
#   - ``include_kg_ids`` — explicit KG-# list (curator-maintained).
#
# A work is a member if it matches EITHER mechanism.  Use ``include_tags``
# for tag-driven groupings (Virtual Ragamala = everything tagged
# ``ragamala``) and ``include_kg_ids`` for catalog publications where the
# membership list comes from a PDF rather than from tags.
#
# Tag values are the same lowercase-kebab strings the website-inventory
# exporter emits — see docs/WEBSITE_SCHEMA.md "Tag taxonomy".
#
# A third mechanism is also supported:
#
#   - ``seed_titles``  — a list of title strings extracted from the
#     gallery's Drive catalog folders.  The pipeline fuzzy-matches each
#     against the website feed (rapidfuzz token-set-ratio, threshold
#     90) and adds the best match to the collection's members.  All
#     match decisions are recorded in ``data/collection_seed_audit.csv``
#     so the curator can spot-check.

collections:
